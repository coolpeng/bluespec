name: BlueSpec
options:
  bundleIdPrefix: com.coolpeng
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  BlueSpec:
    type: application
    platform: iOS
    sources:
      - BlueSpec
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.coolpeng.BlueSpec
        INFOPLIST_KEY_CFBundleDisplayName: BlueSpec
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        GENERATE_INFOPLIST_FILE: YES
    scheme:
      testTargets:
        - BlueSpecTests
  BlueSpecTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - BlueSpecTests
    dependencies:
      - target: BlueSpec
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.coolpeng.BlueSpecTests
        GENERATE_INFOPLIST_FILE: YES
